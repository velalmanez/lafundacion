<section class="container-fluid text-center mt-3">
  <div class="row align-items-center">
    <div class="col">
      <h1>¡CONTACTANOS!</h1>
    </div>
  </div>
  <div class="row align-items-center mt-3 justify-content-center">
    <div class="col-lg-8">
      <form (submit)="submit($event)" class="text-start">
        <div class="mb-3">
          <label for="remitente" class="form-label">Tu correo:</label>
          <input type="email" class="form-control" id="remitente" name="remitente" required />
        </div>
        <div class="row g-2 mb-3">
          <div class="col-md-6">
            <label for="nombre" class="form-label">Nombre(s):</label>
            <input type="text" class="form-control" id="nombre" name="nombre" required />
          </div>
          <div class="col-md-6">
            <label for="apellido" class="form-label">Primer Apellido:</label>
            <input type="text" class="form-control" id="apellido" name="apellido" required />
          </div>
        </div>
        <div class="mb-3">
          <label for="mensaje" class="form-label">Mensaje:</label>
          <textarea class="form-control" id="mensaje" name="mensaje" rows="4" required></textarea>
        </div>
        <div class="mb-3 text-center">
          <button type="submit" class="btn btn-success w-100">Enviar</button>
        </div>
      </form>
      @if (status === 'idle') {
        <div class="d-flex justify-content-center mt-3">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      }
      @if (status === 'success') {
        <div class="alert alert-success mt-3">{{ message }}</div>
      }
      @if (status === 'error') {
        <div class="alert alert-danger mt-3">{{ message }}</div>
      }
    </div>
  </div>
</section>
